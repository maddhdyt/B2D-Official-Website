<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2D Official Website</title>

    <!-- Google Fonts: Inter, Unbounded, Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Unbounded:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS Output -->
    <link rel="stylesheet" href="./src/output.css">
</head>

<body
    class="font-sans bg-[#07080a] text-white selection:bg-blue-500 selection:text-white overflow-x-hidden min-h-screen flex flex-col relative">

    <!-- Background Grid Image -->
    <div class="absolute top-0 left-0 w-full h-[110vh] pointer-events-none z-0 opacity-100"
        style="background-image: url('https://ik.imagekit.io/yqhp1cmbp/list-square.png'); background-size: 70% auto; background-position: center bottom; background-repeat: no-repeat;">
    </div>

    <!-- Floating Stars (Background Decorations) -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <!-- Left Side Stars -->
        <svg class="absolute top-[15%] left-[30%] w-4 h-4 text-gray-500/40 animate-pulse" viewBox="0 0 24 24"
            fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute top-[25%] left-[20%] w-6 h-6 text-gray-500/40" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute top-[35%] left-[8%] w-4 h-4 text-gray-500/30 animate-pulse" viewBox="0 0 24 24"
            fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute top-[55%] left-[12%] w-5 h-5 text-gray-500/30" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute bottom-[35%] left-[22%] w-3 h-3 text-gray-500/50 animate-pulse" viewBox="0 0 24 24"
            fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute bottom-[20%] left-[10%] w-5 h-5 text-gray-500/30" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>

        <!-- Right Side Stars -->
        <svg class="absolute top-[12%] right-[25%] w-4 h-4 text-gray-500/30 animate-pulse" viewBox="0 0 24 24"
            fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute top-[28%] right-[10%] w-3 h-3 text-gray-500/50" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute top-[40%] right-[15%] w-4 h-4 text-gray-500/30" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute bottom-[55%] right-[28%] w-6 h-6 text-gray-500/40 animate-pulse" viewBox="0 0 24 24"
            fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute bottom-[45%] right-[18%] w-5 h-5 text-gray-500/30" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
        <svg class="absolute bottom-[30%] right-[8%] w-6 h-6 text-gray-500/30 animate-pulse" viewBox="0 0 24 24"
            fill="currentColor">
            <path d="M12 0L13.5 8.5L22 10L13.5 11.5L12 20L10.5 11.5L2 10L10.5 8.5L12 0Z" />
        </svg>
    </div>

    <!-- Navbar -->
    <nav class="relative w-full z-50 flex items-center justify-between px-6 md:px-12 py-6 max-w-[90rem] mx-auto">
        <!-- Logo -->
        <div class="flex items-center cursor-pointer group">
            <img src="https://ik.imagekit.io/yqhp1cmbp/group24.png" alt="B2D Logo"
                class="h-6 md:h-8 group-hover:scale-105 transition-transform duration-300">
        </div>

        <!-- Links -->
        <ul class="hidden md:flex items-center gap-10 text-[0.85rem] font-light text-gray-300 font-unbounded">
            <li class="flex items-center gap-1 cursor-pointer hover:text-white transition-colors duration-200">
                Services
                <svg class="w-3.5 h-3.5 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </li>
            <li class="cursor-pointer hover:text-white transition-colors duration-200">About</li>
            <li class="cursor-pointer hover:text-white transition-colors duration-200">Portofolio</li>
            <li class="cursor-pointer hover:text-white transition-colors duration-200">Blog</li>
        </ul>

        <!-- Contact Button -->
        <button
            class="hidden md:block px-7 py-2.5 rounded-full bg-[#111827]/80 backdrop-blur-md border border-blue-500/40 text-sm cursor-pointer hover:bg-blue-900/40 transition-all duration-300 shadow-[0_0_15px_rgba(70,138,255,0.15)] hover:shadow-[0_0_25px_rgba(70,138,255,0.3)] font-unbounded">
            Contact Us
        </button>
    </nav>

    <!-- Main Hero -->
    <main class="relative z-10 flex-1 flex flex-col items-center justify-start pt-20 md:pt-24 w-full">

        <!-- Hero Title Content -->
        <div class="relative flex flex-col items-center justify-center text-center px-4">
            <h1
                class="flex flex-col items-center justify-center font-unbounded font-semibold text-5xl md:text-[6rem] leading-[1.05] tracking-tight">
                <span class="block text-white">Grow</span>

                <span
                    class="relative font-serif italic text-6xl md:text-[7.5rem] font-light mt-2 mb-4 md:mb-6 pr-4 text-white">
                    Smart

                    <!-- Decorative Thin Oval Line -->
                    <svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[140%] h-[160%] text-gray-300/40 pointer-events-none -rotate-2"
                        viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                        <ellipse cx="100" cy="40" rx="98" ry="32" stroke="currentColor" stroke-width="1.2" />
                    </svg>

                    <!-- Sparkle / Star Icon near 'Smart' -->
                    <svg class="absolute -right-8 top-[-10%] w-8 h-8 md:w-10 md:h-10 text-white pointer-events-none animate-pulse"
                        viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2L13.5 9.5L21 11L13.5 12.5L12 20L10.5 12.5L3 11L10.5 9.5L12 2Z" />
                        <path d="M19 4L19.5 6.5L22 7L19.5 7.5L19 10L18.5 7.5L16 7L18.5 6.5L19 4Z" />
                    </svg>
                </span>

                <span class="block text-white">Go Digital</span>
            </h1>

            <!-- Get Started Button -->
            <div class="mt-14 relative group z-20">
                <div
                    class="absolute -inset-0.5 bg-linear-to-r from-[#468AFF] to-[#00FBFF] rounded-full blur opacity-40 group-hover:opacity-75 transition duration-500">
                </div>
                <button
                    class="relative px-10 py-3.5 rounded-full bg-[#0a0f1c] border border-gray-700/50 text-sm md:text-base text-gray-200 hover:text-white transition-all duration-300 font-unbounded cursor-pointer">
                    Get Started
                </button>
            </div>
        </div>

        <!-- Curved Horizon Separator & Glow -->
        <div class="relative w-full mt-16 md:mt-24 h-[120px] md:h-[180px] flex justify-center">
            <!-- The Glow Behind the Curve -->
            <div
                class="absolute bottom-[30px] md:bottom-[50px] w-[80vw] md:w-[60vw] h-[150px] bg-linear-to-t from-[#468AFF]/40 to-[#00FBFF]/5 rounded-t-full filter blur-[50px] pointer-events-none z-0">
            </div>

            <!-- The Gradient Accent (The Curved Line) -->
            <div class="absolute bottom-0 w-[150vw] md:w-[110vw] h-[120px] md:h-[180px] bg-linear-to-r from-[#468AFF] to-[#00FBFF] rounded-t-[50%] z-10 shadow-[0_-5px_20px_rgba(70,138,255,0.2)]"
                style="mask-image: linear-gradient(to right, transparent 15%, black 50%, transparent 85%); -webkit-mask-image: linear-gradient(to right, transparent 15%, black 50%, transparent 85%); pointer-events: none;">
            </div>

            <!-- The Solid Black Rectangle -->
            <div
                class="absolute bottom-[-2px] w-[150vw] md:w-[110vw] h-[120px] md:h-[180px] bg-[#07080a] rounded-t-[50%] z-20 pointer-events-none">
            </div>
        </div>

        <!-- Bottom Description Section (Covered safely by solid background) -->
        <div class="relative w-full bg-[#07080a] z-30 flex justify-center pb-24 px-4 -mt-12 md:-mt-24">
            <div class="max-w-[890px] text-center">
                <p class="text-4xl text-gray-300 leading-[1.4] font-light tracking-normal">
                    B2D <span class="font-serif italic lowercase text-gray-400">adalah layanan penuh</span> STRATEGI,
                    DESAIN <br class="hidden md:block" />
                    dan AGENSI PEMASARAN DIGITAL <span class="font-serif italic lowercase text-gray-400">yang
                        membantu</span>
                    MEREK BERKEMBANG <span class="font-serif italic lowercase text-gray-400">maupun</span> BRAND TUMBUH
                    LEBIH CEPAT.
                </p>
            </div>
        </div>

        <!-- Brand Carousel Section -->
        <div
            class="relative w-full bg-[#07080a] z-30 flex flex-col items-center justify-center pt-8 pb-32 overflow-hidden">
            <p
                class="text-xs md:text-sm text-gray-400 font-unbounded uppercase tracking-[0.2em] md:tracking-[0.3em] mb-12">
                Dipercaya Oleh Brand Inovatif
            </p>

            <!-- Carousel Wrapper -->
            <div class="flex w-full group">
                <!-- First Set of Logos -->
                <div
                    class="flex flex-shrink-0 animate-scroll items-center gap-16 md:gap-24 pr-16 md:pr-24 group-hover:[animation-play-state:paused]">
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-1.png" alt="Brand Logo 1"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-5.png" alt="Brand Logo 2"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group.png" alt="Brand Logo 3"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-2.png" alt="Brand Logo 4"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-4.png" alt="Brand Logo 5"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-3.png" alt="Brand Logo 6"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-7.png" alt="Brand Logo 7"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-6.png" alt="Brand Logo 8"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-8.png" alt="Brand Logo 9"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group%20(1).png" alt="Brand Logo 9"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                </div>

                <!-- Duplicate Set of Logos for Infinite Scroll -->
                <div class="flex flex-shrink-0 animate-scroll items-center gap-16 md:gap-24 pr-16 md:pr-24 group-hover:[animation-play-state:paused]"
                    aria-hidden="true">
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-1.png" alt="Brand Logo 1"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-5.png" alt="Brand Logo 2"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group.png" alt="Brand Logo 3"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-2.png" alt="Brand Logo 4"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-4.png" alt="Brand Logo 5"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-3.png" alt="Brand Logo 6"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-7.png" alt="Brand Logo 7"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-6.png" alt="Brand Logo 8"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group-8.png" alt="Brand Logo 9"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                    <img src="https://ik.imagekit.io/yqhp1cmbp/Mask%20group%20(1).png" alt="Brand Logo 9"
                        class="h-8 md:h-12 w-auto opacity-60 grayscale transition-all duration-300 hover:scale-125 hover:grayscale-0 hover:opacity-100 hover:drop-shadow-[0_0_15px_rgba(0,251,255,0.8)] cursor-pointer" />
                </div>
            </div>

            <!-- Faded edges for smooth entrance/exit of logos -->
            <div
                class="absolute left-0 top-0 bottom-0 w-12 md:w-32 bg-linear-to-r from-[#07080a] to-transparent pointer-events-none">
            </div>
            <div
                class="absolute right-0 top-0 bottom-0 w-12 md:w-32 bg-linear-to-l from-[#07080a] to-transparent pointer-events-none">
            </div>
        </div>

    </main>

</body>

</html>
